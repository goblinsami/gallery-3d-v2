<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery3D V2 Demo</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #151512;
      }

      scrollix-gallery {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <scrollix-gallery id="gallery"></scrollix-gallery>
    <gallery-playground id="playground"></gallery-playground>
    <script type="module">
      import { defineScrollixGalleryElement } from "./src/elements/ScrollixGalleryElement.ts";
      import { defineGalleryPlaygroundElement } from "./src/playground/GalleryPlaygroundElement.ts";
      import { premiumCorridorProject } from "./src/samples/premiumCorridorProject.ts";

      defineScrollixGalleryElement();
      defineGalleryPlaygroundElement();

      const gallery = document.querySelector("#gallery");
      const playground = document.querySelector("#playground");

      gallery.project = premiumCorridorProject;
      playground.project = premiumCorridorProject;
      playground.addEventListener("gallery-playground-change", (event) => {
        gallery.project = event.detail.project;
      });
    </script>
  </body>
</html>
